  const [activeDay, setActiveDay] = useState(0);
  const data = DATA;

  return e("div", {
    style: { minHeight: "100vh", background: "#f5f5f7", paddingBottom: "40px" }
  },
    // Header
    e("div", {
      style: {
        background: "linear-gradient(135deg, #1a3a6c 0%, #2c5f8a 100%)",
        color: "#fff",
        padding: "40px 24px 60px",
        position: "relative",
        overflow: "hidden"
      }
    },
      e("div", {
        style: {
          position: "absolute", top: "-50px", right: "-50px",
          width: "200px", height: "200px",
          background: "rgba(255,255,255,0.05)",
          borderRadius: "50%"
        }
      }),
      e("div", {
        style: {
          position: "absolute", bottom: "-80px", left: "-30px",
          width: "250px", height: "250px",
          background: "rgba(255,255,255,0.04)",
          borderRadius: "50%"
        }
      }),
      e("div", { style: { maxWidth: "900px", margin: "0 auto", position: "relative" } },
        e("div", {
          style: {
            display: "inline-block",
            padding: "6px 14px",
            background: "rgba(255,255,255,0.15)",
            borderRadius: "20px",
            fontSize: "13px",
            fontWeight: 500,
            marginBottom: "16px",
            backdropFilter: "blur(10px)"
          }
        }, `${data.year} · KIRD 신임관리자 과정`),
        e("h1", {
          style: {
            fontSize: "30px",
            fontWeight: 900,
            marginBottom: "12px",
            lineHeight: 1.25,
            whiteSpace: "pre-line"
          }
        }, data.courseName),
        e("p", {
          style: {
            fontSize: "16px",
            opacity: 0.9,
            marginBottom: "16px",
            fontWeight: 300
          }
        }, "참가안내문"),
        e("div", { style: { display: "flex", gap: "8px", flexWrap: "wrap" } },
          ...data.hashtags.map((tag, i) =>
            e("span", {
              key: i,
              style: {
                fontSize: "12px",
                background: "rgba(255,255,255,0.2)",
                padding: "4px 12px",
                borderRadius: "12px",
                fontWeight: 500
              }
            }, tag)
          )
        )
      )
    ),

    // Main content
    e("div", {
      style: {
        maxWidth: "900px",
        margin: "-40px auto 0",
        padding: "0 16px",
        position: "relative"
      }
    },
      // Alert cards
      e("div", {
        style: {
          background: "#fff",
          borderRadius: "16px",
          padding: "20px",
          boxShadow: "0 4px 20px rgba(0,0,0,0.08)",
          marginBottom: "24px"
        }
      },
        e("div", {
          style: {
            fontSize: "13px",
            color: "#666",
            marginBottom: "12px",
            fontWeight: 600
          }
        }, "⚡ 꼭 확인하세요"),
        e("div", {
          style: {
            display: "grid",
            gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))",
            gap: "10px"
          }
        },
          ...data.alerts.map((alert, i) =>
            e("div", {
              key: i,
              style: {
                padding: "12px",
                background: "#fafafa",
                borderRadius: "10px",
                borderLeft: `3px solid ${alert.color}`,
                display: "flex",
                gap: "10px",
                alignItems: "flex-start"
              }
            },
              e("div", { style: { fontSize: "20px", flexShrink: 0 } }, alert.icon),
              e("div", null,
                e("div", {
                  style: { fontSize: "13px", fontWeight: 700, color: alert.color, marginBottom: "2px" }
                }, alert.text),
                e("div", { style: { fontSize: "11px", color: "#666", lineHeight: 1.4, whiteSpace: "pre-line" } }, alert.sub)
              )
            )
          )
        )
      ),

      // Tabs
      e("div", {
        style: {
          background: "#fff",
          borderRadius: "12px",
          padding: "6px",
          marginBottom: "20px",
          boxShadow: "0 2px 8px rgba(0,0,0,0.05)",
          display: "flex",
          gap: "4px"
        }
      },
        ...TABS.map(t =>
          e("button", {
            key: t.id,
            onClick: () => setTab(t.id),
            style: {
              flex: 1,
              padding: "12px 16px",
              border: "none",
              borderRadius: "8px",
              background: tab === t.id ? "#1a3a6c" : "transparent",
              color: tab === t.id ? "#fff" : "#666",
              fontSize: "14px",
              fontWeight: 600,
              cursor: "pointer",
              transition: "all 0.2s",
              fontFamily: "inherit"
            }
          }, `${t.icon} ${t.label}`)
        )
      ),

      // Tab content
      tab === "course" && e(CourseTab, { data, activeDay, setActiveDay }),
      tab === "access" && e(AccessTab, { data }),
      tab === "info" && e(InfoTab, { data })
    )
  );
}

function Section({ title, children, icon }) {
  return e("div", {
    style: {
      background: "#fff",
      borderRadius: "12px",
      padding: "24px",
      marginBottom: "16px",
      boxShadow: "0 2px 8px rgba(0,0,0,0.05)"
    }
  },
    e("h3", {
      style: {
        fontSize: "17px",
        fontWeight: 700,
        marginBottom: "16px",
        color: "#1a3a6c",
        display: "flex",
        alignItems: "center",
        gap: "8px"
      }
    }, icon && e("span", null, icon), title),
    children
  );
}

function CourseTab({ data, activeDay, setActiveDay }) {
  const currentDay = data.schedule[activeDay];

  return e("div", null,
    // Objectives
    e(Section, { title: "교육목표", icon: "🎯" },
      e("ul", { style: { paddingLeft: "20px", color: "#333", fontSize: "14px", lineHeight: 1.8 } },
        ...data.objectives.map((obj, i) => e("li", { key: i }, obj))
      )
    ),

    // Features
    e(Section, { title: "교육특징", icon: "✨" },
      e("ul", { style: { paddingLeft: "20px", color: "#333", fontSize: "14px", lineHeight: 1.8 } },
        ...data.features.map((f, i) => e("li", { key: i }, f))
      )
    ),

    // Overview
    e(Section, { title: "과정개요", icon: "📖" },
      e("div", { style: { display: "grid", gap: "10px" } },
        ...[
          { label: "대상", value: data.overview.target },
          { label: "기간", value: data.overview.period },
          { label: "장소", value: data.overview.location },
          { label: "주관", value: data.overview.organizer }
        ].map((item, i) =>
          e("div", {
            key: i,
            style: {
              display: "grid",
              gridTemplateColumns: "80px 1fr",
              gap: "12px",
              padding: "10px 0",
              borderBottom: i < 3 ? "1px solid #f0f0f0" : "none"
            }
          },
            e("div", {
              style: {
                fontSize: "13px",
                fontWeight: 700,
                color: "#1a3a6c"
              }
            }, item.label),
            e("div", { style: { fontSize: "13px", color: "#333", lineHeight: 1.6 } }, item.value)
          )
        )
      )
    ),

    // Schedule
    e(Section, { title: "교육일정", icon: "📅" },
      e("div", {
        style: {
          fontSize: "11px",
          color: "#999",
          marginBottom: "12px",
          fontStyle: "italic"
        }
      }, "※ 상기 일정은 내부 사정에 따라 변경 가능"),
      e("div", { style: { display: "flex", gap: "6px", marginBottom: "16px", flexWrap: "wrap" } },
        ...data.schedule.map((d, i) =>
          e("button", {
            key: i,
            onClick: () => setActiveDay(i),
            style: {
              flex: "1 1 80px",
              padding: "10px 6px",
              border: activeDay === i ? "2px solid #1a3a6c" : "1px solid #e0e0e0",
              borderRadius: "8px",
              background: activeDay === i ? "#1a3a6c" : "#fff",
              color: activeDay === i ? "#fff" : "#333",
              cursor: "pointer",
              fontSize: "13px",
              fontWeight: 600,
              transition: "all 0.2s",
              fontFamily: "inherit"
            }
          },
            e("div", { style: { fontWeight: 700 } }, d.label),
            e("div", { style: { fontSize: "11px", marginTop: "2px", opacity: 0.8 } }, d.date)
          )
        )
      ),
      // Day-level note (e.g., 분반 안내)
      currentDay.note && e("div", {
        style: {
          padding: "10px 14px",
          background: "#eef0fa",
          color: "#2c3c8a",
          borderRadius: "8px",
          fontSize: "13px",
          fontWeight: 600,
          marginBottom: "12px"
        }
      }, currentDay.note),
      e("div", { style: { display: "grid", gap: "10px" } },
        ...currentDay.sessions.map((s, i) => {
          const isMeal = !s.tag && (s.title.includes("식") || s.title.includes("등록") || s.title.includes("출석") || s.title.includes("퇴소") || s.title.includes("수료안내"));
          return e("div", {
            key: i,
            style: {
              padding: "14px",
              background: isMeal ? "#fafafa" : "#f8fafc",
              borderRadius: "10px",
              border: isMeal ? "1px solid #f0f0f0" : "1px solid #e0e7f0"
            }
          },
            e("div", {
              style: {
                display: "flex",
                justifyContent: "space-between",
                alignItems: "center",
                marginBottom: s.desc ? "8px" : "0",
                flexWrap: "wrap",
                gap: "8px"
              }
            },
              e("div", { style: { display: "flex", gap: "10px", alignItems: "center", flexWrap: "wrap" } },
                e("span", {
                  style: {
                    fontSize: "13px",
                    fontWeight: 700,
                    color: "#1a3a6c",
                    fontFamily: "monospace"
                  }
                }, s.time),
                e("span", { style: { fontSize: "11px", color: "#999" } }, s.min)
              ),
              s.tag && e("span", {
                style: {
                  fontSize: "11px",
                  padding: "3px 10px",
                  borderRadius: "10px",
                  background: tagColors[s.tag]?.bg || "#eee",
                  color: tagColors[s.tag]?.fg || "#666",
                  fontWeight: 600
                }
              }, s.tag)
            ),
            e("div", {
              style: {
                fontSize: "14px",
                fontWeight: 600,
                color: "#1a1a1a",
                marginBottom: s.desc ? "6px" : "0"
              }
            }, s.title),
            s.desc && e("div", {
              style: {
                fontSize: "12px",
                color: "#666",
                lineHeight: 1.6,
                whiteSpace: "pre-line"
              }
            }, s.desc)
          );
        })
      )
    )
  );
}

function AccessTab({ data }) {
  return e("div", null,
    // Venue
    e(Section, { title: "교육장소", icon: "🏨" },
      e("div", {
        style: {
          padding: "16px",
          background: "linear-gradient(135deg, #e8eef6 0%, #f0f4f9 100%)",
          borderRadius: "10px",
          marginBottom: "16px"
        }
      },
        e("div", {
          style: { fontSize: "16px", fontWeight: 700, color: "#1a3a6c", marginBottom: "8px" }
        }, data.facilities.venue.name),
        e("div", {
          style: { fontSize: "13px", color: "#333", lineHeight: 1.7, whiteSpace: "pre-line" }
        }, data.facilities.venue.desc)
      ),
      e("div", { style: { display: "grid", gap: "10px" } },
        e("div", {
          style: {
            display: "grid",
            gridTemplateColumns: "80px 1fr",
            gap: "12px",
            padding: "10px 0",
            borderBottom: "1px solid #f0f0f0"
          }
        },
          e("div", { style: { fontSize: "13px", fontWeight: 700, color: "#1a3a6c" } }, "주소"),
          e("div", { style: { fontSize: "13px", color: "#333" } }, data.directions.address)
        ),
        e("div", {
          style: {
            display: "grid",
            gridTemplateColumns: "80px 1fr",
            gap: "12px",
            padding: "10px 0"
          }
        },
          e("div", { style: { fontSize: "13px", fontWeight: 700, color: "#1a3a6c" } }, "전화번호"),
          e("a", {
            href: `tel:${data.directions.phone}`,
            style: { fontSize: "13px", color: "#2c5f8a", textDecoration: "none", fontWeight: 500 }
          }, data.directions.phone)
        )
      )
    ),

    // 대중교통 (버스)
    e(Section, { title: "대중교통 이용 (개별 이동 시)", icon: "🚌" },
      e("div", {
        style: {
          padding: "14px",
          background: "#f8fafc",
          borderRadius: "10px",
          border: "1px solid #e0e7f0",
          marginBottom: "10px"
        }
      },
        e("div", { style: { fontSize: "13px", fontWeight: 700, color: "#1a3a6c", marginBottom: "6px" } },
          "🚏 버스 (도착: 덕산스파 버스정류소)"),
        e("div", { style: { fontSize: "13px", color: "#555", lineHeight: 1.6 } },
          "강남센트럴시티(호남선) → 덕산스파 정류소 (하차 후 도보 약 5분)")
      )
    ),

    // 셔틀버스 (대전/서울 노선)
    e(Section, { title: "셔틀버스 탑승 안내", icon: "🚐" },
      e("div", { style: { display: "grid", gap: "16px" } },
        ...data.directions.shuttleRoutes.map((route, ri) =>
          e("div", {
            key: ri,
            style: {
              border: "1px solid #e0e7f0",
              borderRadius: "12px",
              overflow: "hidden"
            }
          },
            e("div", {
              style: {
                padding: "10px 14px",
                background: ri === 0 ? "linear-gradient(135deg, #1a3a6c 0%, #2c5f8a 100%)" : "linear-gradient(135deg, #2d5016 0%, #4a7a2e 100%)",
                color: "#fff",
                fontSize: "14px",
                fontWeight: 800
              }
            }, route.name),
            e("div", { style: { padding: "10px 14px", display: "grid", gap: "8px" } },
              ...route.stops.map((st, si) =>
                e("div", {
                  key: si,
                  style: {
                    display: "grid",
                    gridTemplateColumns: "auto 1fr",
                    gap: "10px",
                    alignItems: "start",
                    paddingBottom: si < route.stops.length - 1 ? "8px" : "0",
                    borderBottom: si < route.stops.length - 1 ? "1px dashed #e0e7f0" : "none"
                  }
                },
                  e("div", { style: { fontSize: "13px", fontWeight: 700, color: "#c0392b", whiteSpace: "nowrap", paddingTop: "1px" } }, st.time),
                  e("div", null,
                    e("div", { style: { fontSize: "13px", fontWeight: 700, color: "#1a3a6c" } }, st.label),
                    e("div", { style: { fontSize: "12px", color: "#666", lineHeight: 1.5, marginTop: "2px" } }, st.desc),
                    st.img && e("div", {
                      style: {
                        marginTop: "10px",
                        borderRadius: "10px",
                        overflow: "hidden",
                        border: "1px solid #e0e7f0",
                        background: "#f8fafc"
                      }
                    },
                      e("img", {
                        src: st.img,
                        alt: `${st.label} 정차 위치`,
                        style: {
                          width: "100%",
                          aspectRatio: "4 / 3",
                          objectFit: "cover",
                          display: "block"
                        }
                      }),
                      e("div", {
                        style: {
                          padding: "6px 10px",
                          fontSize: "11px",
                          color: "#c0392b",
                          fontWeight: 700,
                          background: "#fff"
                        }
                      }, "📍 정차 장소")
                    )
                  )
                )
              )
            )
          )
        ),
        e("div", {
          style: {
            padding: "12px 14px",
            background: "#fdecea",
            color: "#c0392b",
            borderRadius: "8px",
            fontSize: "12px",
            fontWeight: 600,
            lineHeight: 1.7
          }
        },
          ...data.directions.shuttleNotes.map((n, i) =>
            e("div", { key: i, style: { marginBottom: i < data.directions.shuttleNotes.length - 1 ? "4px" : "0" } }, `• ${n}`)
          )
        )
      )
    )
  );
}

function InfoTab({ data }) {
  return e("div", null,
    // Preparation
    e(Section, { title: "참가 준비", icon: "🎒" },
      e("div", { style: { display: "grid", gap: "12px" } },
        e("div", { style: { padding: "12px", background: "#f8fafc", borderRadius: "8px" } },
          e("div", { style: { fontSize: "13px", fontWeight: 700, color: "#1a3a6c", marginBottom: "4px" } }, "👔 교육 복장"),
          e("div", { style: { fontSize: "13px", color: "#333", lineHeight: 1.6 } }, data.preparation.dress)
        ),
        e("div", { style: { padding: "12px", background: "#f8fafc", borderRadius: "8px" } },
          e("div", { style: { fontSize: "13px", fontWeight: 700, color: "#1a3a6c", marginBottom: "4px" } }, "🧳 준비물"),
          e("div", { style: { fontSize: "13px", color: "#333", lineHeight: 1.6 } }, data.preparation.items)
        ),
        e("div", { style: { padding: "12px", background: "#fdecea", borderRadius: "8px", border: "1px solid #f5b7b1" } },
          e("div", { style: { fontSize: "13px", fontWeight: 700, color: "#c0392b", marginBottom: "4px" } }, "🪪 신분증 필참 (연구현장 시찰)"),
          e("div", { style: { fontSize: "13px", color: "#c0392b", lineHeight: 1.6 } }, data.preparation.idNote)
        )
      )
    ),

    // Completion
    e(Section, { title: "교육 수료", icon: "🎓" },
      e("div", {
        style: {
          padding: "12px",
          background: "#fdecea",
          borderRadius: "8px",
          marginBottom: "12px",
          fontSize: "13px",
          fontWeight: 700,
          color: "#c0392b"
        }
      }, "⚠️ 미수료 시 소속기관에 통보됩니다"),
      e("ul", { style: { paddingLeft: "20px", color: "#333", fontSize: "13px", lineHeight: 1.9 } },
        ...data.completion.map((c, i) => e("li", { key: i }, c))
      )
    ),

    // Contacts
    e(Section, { title: "문의처", icon: "📞" },
      e("div", { style: { display: "grid", gap: "10px" } },
        ...data.contacts.map((c, i) =>
          e("div", {
            key: i,
            style: {
              padding: "14px",
              background: "#f8fafc",
              borderRadius: "10px",
              border: "1px solid #e0e7f0"
            }
          },
            e("div", {
              style: {
                fontSize: "12px",
                fontWeight: 700,
                color: "#1a3a6c",
                marginBottom: "8px"
              }
            }, c.role),
            e("div", { style: { display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: "8px" } },
              e("div", { style: { fontSize: "14px", fontWeight: 600, color: "#1a1a1a" } }, c.name),
              e("div", { style: { display: "flex", gap: "12px", flexWrap: "wrap" } },
                e("a", {
                  href: `tel:${c.phone}`,
                  style: { fontSize: "12px", color: "#2c5f8a", textDecoration: "none", fontWeight: 500 }
                }, `📞 ${c.phone}`),
                e("a", {
                  href: `mailto:${c.email}`,
                  style: { fontSize: "12px", color: "#2c5f8a", textDecoration: "none", fontWeight: 500 }
                }, `✉ ${c.email}`)
              )
            )
          )
        )
      )
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(Guide));
</script>
</body>
</html>
